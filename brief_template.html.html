<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Signium Brief</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; font-size:10.5pt; background:#bbb; }
@media print {
  body { background:white; }
  .bar { display:none !important; }
  .page { box-shadow:none; margin:0; padding:45mm 20mm 30mm 20mm; }
}
.bar {
  position:fixed; top:0; left:0; right:0; background:#081D4D;
  padding:8px 20px; display:flex; gap:12px; align-items:center; z-index:99;
}
.bar span { color:rgba(255,255,255,.6); font-size:12px; }
.bar button { padding:6px 16px; border:none; border-radius:4px; font-size:12px; cursor:pointer; }
.bar .p { background:#FF6A42; color:white; }
.bar .c { background:rgba(255,255,255,.2); color:white; }
.wrap { padding:50px 0 30px; display:flex; justify-content:center; }
.page {
  width:210mm; background:white;
  box-shadow:0 2px 20px rgba(0,0,0,.25);
  padding:50mm 20mm 30mm 20mm;
}
.date { text-align:right; font-size:9.5pt; color:#444; margin-bottom:10mm; }
.recip { font-size:9.5pt; line-height:1.6; margin-bottom:10mm; white-space:pre-wrap; }
.subj { font-size:10pt; margin-bottom:8mm; }
.body { font-size:10pt; line-height:1.7; }
[contenteditable]:focus { outline:1px dashed #24629B; }
</style>
</head>
<body>
<div class="bar">
  <span>Auf Signium-Briefpapier drucken &mdash; Felder direkt bearbeiten</span>
  <button class="p" onclick="window.print()">&#128424; Drucken</button>
  <button class="c" onclick="window.close()">&#10005; Schlie&szlig;en</button>
</div>
<div class="wrap">
<div class="page">
  <div class="date">Wien, <span id="dt" contenteditable="true">DATUM</span></div>
  <div class="recip" id="recip" contenteditable="true">Unternehmen
Abteilung
Name
Stra&szlig;e
PLZ Stadt
Land</div>
  <div class="subj" id="subj" contenteditable="true"></div>
  <div class="body" id="body" contenteditable="true"></div>
</div>
</div>
<script>
var d=new Date();
document.getElementById("dt").textContent=d.toLocaleDateString("de-AT",{day:"numeric",month:"long",year:"numeric"});
var raw=new URLSearchParams(window.location.search).get("text");
if(raw){
  var t=decodeURIComponent(raw);
  t=t.replace(/henry-signium\.netlify\.app/g,"paul-signium.netlify.app");
  t=t.replace(/\*\*/g,"");
  var sm=t.match(/^Betreff:\s*(.+)/mi);
  if(sm) document.getElementById("subj").textContent="Betreff: "+sm[1].trim();
  t=t.replace(/^Betreff:[^\n]+\n?/mi,"");
  // Replace "Dokumentname: https://..." with just "Dokumentname" (no URL)
  t=t.replace(/([^\n:]+):\s*https?:\/\/\S+/g,"$1");
  // Remove any remaining standalone URLs
  t=t.replace(/https?:\/\/\S+/g,"");
  t=t.replace(/\n/g,"<br>");
  document.getElementById("body").innerHTML=t.trim();
}
</script>
</body>
</html>
