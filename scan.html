<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HENRY Scan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#F7F6F2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px;max-width:680px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
h1{font-size:18px;font-weight:700;color:#0D2240;margin-bottom:8px}
p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.6}
button{width:100%;padding:16px;font-size:15px;font-weight:600;background:#C9A84C;color:#0D2240;border:none;border-radius:10px;cursor:pointer}
button:disabled{background:#ccc;cursor:not-allowed}
#msg{margin-top:16px;padding:12px;border-radius:8px;font-size:13px;display:none;line-height:1.6}
.info{background:#e6f1fb;color:#185FA5}
.ok{background:#e8f5ee;color:#2d7a4f}
.err{background:#fceaea;color:#a32d2d}
.item{background:#F7F6F2;border-left:3px solid #0D2240;border-radius:6px;padding:12px;margin-top:8px}
.co{font-weight:600;color:#0D2240;font-size:14px}
.ty{font-size:11px;background:#0D2240;color:#fff;padding:2px 8px;border-radius:20px;display:inline-block;margin:4px 0}
.de{font-size:12px;color:#444;margin-top:4px;line-height:1.5}
#raw{margin-top:16px;background:#f0f0f0;padding:12px;border-radius:8px;font-size:11px;color:#333;white-space:pre-wrap;word-break:break-all;display:none}
a.dl{display:block;text-align:center;margin-top:20px;font-size:12px;color:#185FA5}
</style>
</head>
<body>
<div class="card">
<h1>HENRY Scan</h1>
<p>Scannt Wirtschaftsnachrichten aus DACH/CEE nach Führungswechseln, Funding und M&A.</p>
<button id="btn" onclick="window.run()">Jetzt scannen</button>
<div id="msg"></div>
<div id="raw"></div>
<div id="res"></div>
<a class="dl" href="https://henry-signium.netlify.app" target="_blank">HENRY Dashboard öffnen</a>
</div>
<script>
var S='https://ftdxhswcnghlmcagrsox.supabase.co';
var SK='sb_publishable_c8YygosML2xrImmWCpI1rw_6j_pvCRA';
var PK='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';

function show(t,c){var e=document.getElementById('msg');e.textContent=t;e.className=c;e.style.display='block';}
function showRaw(t){var e=document.getElementById('raw');e.textContent='PERPLEXITY ANTWORT:\n\n'+t;e.style.display='block';}

function fetchWithTimeout(url,opts,ms){
  return Promise.race([
    fetch(url,opts),
    new Promise(function(_,rej){setTimeout(function(){rej(new Error('Timeout nach '+ms/1000+'s'));},ms);})
  ]);
}

window.run=async function(){
  var btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='Scannt...';
  document.getElementById('res').innerHTML='';
  document.getElementById('raw').style.display='none';
  show('Lade Unternehmensliste...','info');

  try{
    var r=await fetchWithTimeout(S+'/rest/v1/companies?select=id,name',
      {headers:{'apikey':SK,'Authorization':'Bearer '+SK}},10000);
    var companies=await r.json();
    if(!Array.isArray(companies)||companies.length===0){
      show('Keine Unternehmen in der Datenbank.','err');
      btn.disabled=false;btn.textContent='Erneut scannen';return;
    }

    show('Frage Perplexity (max. 30s)...','info');

    var pr=await fetchWithTimeout('https://api.perplexity.ai/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+PK,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'sonar',
        max_tokens:2000,
        messages:[
          {role:'system',content:'You are a business news analyst. Reply ONLY with a JSON array, no other text, no markdown.'},
          {role:'user',content:'List up to 20 recent business events (last 7 days) from Germany, Austria, Switzerland, Poland, Czech Republic, Hungary, Romania: leadership changes (CEO, CFO, board appointments/resignations), funding rounds, M&A deals. Reply ONLY with this JSON array format: [{"company":"Company Name","trigger_type":"CEO Change","description":"Brief description of what happened"}]'}
        ]
      })
    },30000);

    var pd=await pr.json();
    var txt='';
    if(pd.choices&&pd.choices[0]&&pd.choices[0].message){
      txt=pd.choices[0].message.content||'';
    } else {
      showRaw(JSON.stringify(pd,null,2));
      show('Perplexity hat keine gueltige Antwort geliefert.','err');
      btn.disabled=false;btn.textContent='Erneut scannen';return;
    }

    showRaw(txt);

    var items=[];
    try{
      var clean=txt.replace(/```json|```/g,'').trim();
      var start=clean.indexOf('[');
      var end=clean.lastIndexOf(']');
      if(start>=0&&end>start){
        items=JSON.parse(clean.substring(start,end+1));
      }
    }catch(e){
      show('JSON-Parse fehlgeschlagen. Siehe Rohtext unten.','err');
      btn.disabled=false;btn.textContent='Erneut scannen';return;
    }

    if(items.length===0){
      show('Perplexity hat 0 Ereignisse geliefert. Siehe Rohtext unten.','err');
      btn.disabled=false;btn.textContent='Erneut scannen';return;
    }

    var found=[];
    for(var j=0;j<items.length;j++){
      var it=items[j];
      if(!it.company||!it.trigger_type)continue;
      var itLow=it.company.toLowerCase();
      var co=null;
      for(var k=0;k<companies.length;k++){
        var cnLow=companies[k].name.toLowerCase();
        if(cnLow===itLow||cnLow.indexOf(itLow)>=0||itLow.indexOf(cnLow)>=0){co=companies[k];break;}
      }
      if(co){
        await fetch(S+'/rest/v1/triggers',{
          method:'POST',
          headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({company_id:co.id,trigger_type:it.trigger_type,description:it.description||'',relevance_score:80})
        });
        found.push({company:it.company,trigger_type:it.trigger_type,description:it.description||''});
      }
    }

    if(found.length){
      show('Fertig: '+found.length+' Treffer in Ihrer Zielliste gespeichert.','ok');
      var h='';
      for(var f=0;f<found.length;f++){
        h+='<div class="item"><div class="co">'+found[f].company+'</div><span class="ty">'+found[f].trigger_type+'</span><div class="de">'+found[f].description+'</div></div>';
      }
      document.getElementById('res').innerHTML=h;
    } else {
      show('Perplexity hat '+items.length+' Ereignisse gefunden — kein Match mit Ihren '+companies.length+' Unternehmen.','ok');
    }

  }catch(e){
    show('Fehler: '+e.message,'err');
  }
  btn.disabled=false;btn.textContent='Erneut scannen';
};
</script>
</body>
</html>
